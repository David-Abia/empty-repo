<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Guess</title>
    <link rel="shortcut icon" href="logo2.png" type="image/x-icon">
<style>

    #container{
       text-align: center;
    }

button{
    width: 50px;
    height: 50px;
    box-sizing: content-box;
    margin-bottom: 3px;
    cursor: pointer;
    
}

.blueColor{
    background: #0000ff;
    color: #ffff;
    border: none;
    border-radius: 5px;
    margin-bottom: 10px;

}

h1{
    color: #0000ff;
    font-family: Arial, Helvetica, sans-serif;
}

h3{
    color: #0000ff;
    font-family: Arial, Helvetica, sans-serif;
}

.p1{
    font-family: Arial, Helvetica, sans-serif;
    color: gray;
}

ul{
    column-count: 3;
    list-style: none;
}



</style>
</head>

<body>
    <div id="container">
        <h1>Color Guessing</h1>
        <h3>Example</h3>
    <button class="blueColor">Blue</button><br>
<p class="p1">You guess the color in your <br> mind then you click, 
    you can <br>guess as many colors as you like</p>
    <h3>Available colors</h3>
    <ul>
        <li class="#F74B00">Orange</li>
        <li class="gray">Grey</li>
        <li class="blue">Blue</li>
        <li class="brown">Brown</li>
        <li class="green">Green</li>
        <li class="yellow">Yellow</li>
        <li class="#F7138E">Pink</li>
        <li class="purple">Purple</li>
        <li class="lightgreen">Light green</li>
        <li class="white">White</li>
        <li class="black">Black</li>
        <li class="red">Red</li>
    </ul>
    <button id="red">color?</button>
    <button id="grey">color?</button>
    <button id="brown">color?</button><br>
    <button id="blue">color?</button>
    <button id="green">color?</button>
    <button id="yellow">color?</button><br>
    <button id="pink">color?</button>
    <button id="purple">color?</button>
    <button id="black">color?</button><br>
    <button id="white">color?</button>
    <button id="lightgreen">color?</button>
    <button id="#F74B00">color?</button><br>
    <button id="update">Restart</button>
    </div>


    <script src="script.js">

    </script>
</body>
</html>
